<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FMI latest release documentation</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      max-width: 48rem;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .muted { color: #555; }
    .links a { margin-right: 1rem; }
  </style>
</head>
<body>
  <h1>FMI latest release documentation</h1>
  <p id="status">Resolving latest release tag...</p>
  <p class="muted" id="detail"></p>
  <p class="links">
    <a id="target-link" href="#" hidden>Open latest release documentation</a>
    <a href="/docs/main/">Open development documentation</a>
    <a href="https://github.com/modelica/fmi-standard/releases/latest">Open latest GitHub release</a>
  </p>
  <script>
    (async () => {
      const status = document.getElementById('status');
      const detail = document.getElementById('detail');
      const targetLink = document.getElementById('target-link');

      const basePath = window.location.protocol === 'file:' ? '../' : '/docs/';

      try {
        const response = await fetch('https://api.github.com/repos/modelica/fmi-standard/releases/latest', {
          headers: { 'Accept': 'application/vnd.github+json' }
        });

        if (!response.ok) {
          status.textContent = 'Could not resolve latest release automatically.';
          detail.textContent = 'GitHub API responded with status ' + response.status + '. Use one of the links below.';
          return;
        }

        const release = await response.json();
        const tag = String(release.tag_name || '').trim();
        const version = tag.replace(/^v/, '');

        if (!version) {
          status.textContent = 'Latest release tag is missing.';
          detail.textContent = 'Use one of the links below.';
          return;
        }

        const target = basePath + encodeURIComponent(version) + '/index.html';
        targetLink.href = target;
        targetLink.hidden = false;

        status.textContent = 'Resolved latest release: ' + tag;
        detail.textContent = 'Redirecting to ' + target + ' ...';

        window.setTimeout(() => {
          window.location.replace(target);
        }, 400);
      } catch (error) {
        status.textContent = 'Could not contact GitHub API from this environment.';
        detail.textContent = 'Automatic redirect is unavailable. Use one of the links below.';
      }
    })();
  </script>
</body>
</html>
